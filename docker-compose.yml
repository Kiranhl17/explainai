version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: explainai-backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      # Mount uploads directory for persistence across container restarts
      - ./backend/uploads:/home/explainai/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Add Redis for multi-worker session persistence
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
